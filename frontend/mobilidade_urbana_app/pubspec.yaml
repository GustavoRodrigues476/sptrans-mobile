name: mobilidade_urbana_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1
  flutter_dotenv: ^6.0.0
  flutter_map: ^8.2.2
  go_router: ^17.1.0
  dio: ^5.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  image_path_android: "assets/icon/icon.png"
  image_path_ios: "assets/icon/icon.png"
  adaptive_icon_foreground: "assets/icon/icon.png"
  adaptive_icon_background: "#D4FF73"
  adaptive_icon_foreground_padding: 16
  web: 
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#D4FF73"
    



flutter:
  uses-material-design: true
  assets:
    - assets/
  
